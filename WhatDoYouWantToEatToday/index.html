<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>週末用餐輪盤 🍕</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎰 週末用餐輪盤 一番賞 🎰</h1>
        
        <div class="slot-machine">
            <div class="slot-card adult-card">
                <h2>👨 大人吃什麼？</h2>
                <div class="display-window">
                    <div id="adult-display" class="food-text">？ ？ ？</div>
                </div>
                <button id="adult-btn" class="spin-btn">START 🚀</button>
            </div>

            <div class="slot-card kid-card">
                <h2>👦 小朋友吃什麼？</h2>
                <div class="display-window">
                    <div id="kid-display" class="food-text">？ ？ ？</div>
                </div>
                <button id="kid-btn" class="spin-btn">START 🎯</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
